name: Validar build (CI)

# Roda o build em todo PR: conteúdo com frontmatter inválido (campo faltando,
# questão sem 5 alternativas etc.) é barrado aqui antes de chegar na main.
on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
