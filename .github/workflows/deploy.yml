name: Deploy no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publica o build na branch gh-pages; o GitHub Pages serve a partir dela.
# (O método via actions/deploy-pages exige habilitar o Pages manualmente
# nas configurações do repositório; o push na gh-pages habilita sozinho.)
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /caderno-do-aluno
          SITE_URL: https://bazhish.github.io
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
