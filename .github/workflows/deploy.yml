name: Deploy no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publica o build na branch gh-pages; o GitHub Pages serve a partir dela.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /caderno-da-turma
          SITE_URL: https://bazhish.github.io
          # Chaves públicas do Supabase (anon key é feita pra ir ao navegador;
          # a segurança real é a RLS). Definidas em Settings → Secrets and
          # variables → Actions → Variables. Vazias = modo demonstração.
          PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ vars.PUBLIC_SUPABASE_ANON_KEY }}
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
