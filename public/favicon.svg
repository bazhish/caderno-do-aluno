<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Caderno da Turma">
  <title>Caderno da Turma</title>
  <!-- Moldura estilo capa de fichário (funciona em aba clara ou escura) -->
  <rect x="6" y="6" width="116" height="116" rx="26" fill="#1f2a44"/>
  <!-- Folha de caderno creme, encaixada com uma margem navy ao redor -->
  <rect x="24" y="20" width="86" height="88" rx="11" fill="#edeadf"/>
  <!-- Margem vermelha do caderno -->
  <rect x="47" y="20" width="3" height="88" fill="#c4432b" opacity="0.85"/>
  <!-- Três furos do fichário, "vazados" até a moldura navy -->
  <circle cx="35" cy="41" r="5.2" fill="#1f2a44"/>
  <circle cx="35" cy="64" r="5.2" fill="#1f2a44"/>
  <circle cx="35" cy="87" r="5.2" fill="#1f2a44"/>
  <!-- Linha-título + o ponto vermelho da marca "Caderno da Turma." -->
  <rect x="57" y="37" width="38" height="8" rx="4" fill="#1f2a44"/>
  <circle cx="101" cy="41" r="4.5" fill="#c4432b"/>
  <!-- Linhas de texto -->
  <rect x="57" y="58" width="44" height="6" rx="3" fill="#5b6478" opacity="0.55"/>
  <rect x="57" y="73" width="36" height="6" rx="3" fill="#5b6478" opacity="0.55"/>
  <rect x="57" y="88" width="41" height="6" rx="3" fill="#5b6478" opacity="0.55"/>
</svg>
